<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="themeStylesheet" rel="stylesheet" href="updates/minimal.css">
<title>
  What I'm doing right now
</title>
</head>

<body>
<h1>
  What I'm doing right now
</h1>

<h2>
  Real-time updates on my wild and exciting life.
</h2>

<select id="themeSelector">
  <option value="minimal.css">Minimal</option>
  <option value="terminal.css">Terminal</option>
  <option value="newspaper.css">Newspaper</option>
  <option value="chat.css">Chat</option>
  <option value="aesthetic.css">Aesthetic</option>
  <option value="soft-paper.css">Soft-Paper</option>
  <option value="faded.css">Faded</option>
  <option value="plain-feed.css">Plain-Feed</option>
  <option value="dim.css">Dim</option>
  <option value="type-lite.css">Type</option>
</select>

<div id="result"></div>

<input id="seed" placeholder="May 2026">
<button onclick="runMany()">Generate results</button>


<script src="updates/dailyUpdates.js"> </script>

<script>
  function runMany() {
    const seed = document.getElementById("seed").value;

    // creates only one generator
    const generator = createGenerator(seed);

    // separate RNG for different dates
    const rng = mulberry32(hashSeed(seed + "-dates"));

    // chronological math
    const [monthName, yearString] = seed.trim().split(/\s+/);
    const year = parseInt(yearString, 10);

    const monthMap = {
      January: 0,
      February: 1,
      March: 2,
      April: 3,
      May: 4,
      June: 5,
      July: 6,
      August: 7,
      September: 8,
      October: 9,
      November: 10,
      December: 11,
    }

    const month = monthMap[monthName];

    if (month === undefined || isNaN(year)) {
      document.getElementById("result").innerHTML = "Seed must be in the form of 'May 2026'";
      return;
    }

    const selectedMonth = new Date(year, month, 1);

    const currentEastern = new Date(
      new Date().toLocaleString("en-US", {
      timeZone: "America/New_York"
    })
  );
  
  const currentMonth = new Date(
    currentEastern.getFullYear(),
    currentEastern.getMonth(),
    1
  );

  if (selectedMonth > currentMonth) {
    document.getElementById("result").innerHTML = "That month is in the future.";
    return;
  }

    // convert to Eastern
    const easternNow = new Date(
      new Date().toLocaleString("en-US", {
        timeZone: "America/New_York"
      })
    );

    // Last day of selected month
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Determine latest allowable timestamp
    const monthStart = new Date(year, month, 1, 0, 0, 0);
    const monthEnd = new Date(year, month + 1, 0, 23, 59, 59);
    
    //if this is the current month, stop at current eastern time.
    let rangeEnd = monthEnd;
    if (
      year === currentEastern.getFullYear() &&
      month === currentEastern.getMonth()
    ) {
      rangeEnd = currentEastern;
    }

    // timestamp generation loop
    // generates full 30. will remove any past current time later
    const entries = [];

    // generates between 20-40 entires per month
    const entryCount = 25 + Math.floor(rng() * 16);
    for (let i = 0; i < entryCount; i++) {
      let timestamp;

      while (true) {
        const randomTime =
        monthStart.getTime() +
        Math.floor(
          rng() * (monthEnd.getTime() - monthStart.getTime())
        );

        const d = new Date(randomTime);

        const hour = d.getHours();

        // valid times is 5AM through 10pm. or Midnight to 1AM
        if ((hour >= 5 && hour <= 22) || hour === 0) {
          timestamp = d;
          break;
        }
      }

      entries.push({
        timestamp,
        text: generator()
      });
    }

    // sort chronologically
    entries.sort((a, b) => b.timestamp - a.timestamp);

    // if it's the current month, remove future entries
    if (
      year === currentEastern.getFullYear() &&
      month === currentEastern.getMonth()
    ) {
      entries.splice(
        0,
        entries.length,
        ...entries.filter(
          entry => entry.timestamp <= currentEastern
        )
      );
    }


    let output = "";

    for (const entry of entries) {
      const stamp = entry.timestamp.toLocaleString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      });

      output += `
      <div class="update">
        <div class="post-header">
          <span class="post-date"">${stamp}</span>
        </div>
        <div class="post-text">
          ${entry.text}
        </div>
      </div>
      `;
    }

    document.getElementById("result").innerHTML = output;
  }
  </script>

  <script>
  const themeSelector = document.getElementById("themeSelector");
  const themeLink = document.getElementById("themeStylesheet");

  // Load saved theme (if user picked one before)
  const savedTheme = localStorage.getItem("selectedTheme");
  if (savedTheme) {
    themeLink.href = "updates/" + savedTheme;
    themeSelector.value = savedTheme;
  }

  themeSelector.addEventListener("change", function () {
    const selected = themeSelector.value;
    themeLink.href = "updates/" + selected;

    // save preference
    localStorage.setItem("selectedTheme", selected);
  });
</script>

  
</body>
</html>
